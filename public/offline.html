<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>No Internet — Rojgar Suvidha</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #eef2ff 0%, #f5f3ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 28px;
      padding: 48px 40px;
      text-align: center;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(99,102,241,0.12);
      border: 1px solid rgba(99,102,241,0.1);
    }
    .icon {
      font-size: 72px;
      margin-bottom: 24px;
      display: block;
      animation: bounce 2s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    h1 {
      font-size: 28px;
      font-weight: 900;
      color: #1e1b4b;
      margin-bottom: 12px;
    }
    p {
      color: #6b7280;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .tips {
      background: #f0f4ff;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 28px;
      text-align: left;
    }
    .tips h3 {
      font-size: 13px;
      font-weight: 700;
      color: #4f46e5;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }
    .tips ul { list-style: none; }
    .tips li {
      font-size: 13px;
      color: #374151;
      padding: 4px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 24px rgba(79,70,229,0.3);
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(79,70,229,0.4);
    }
    button:active { transform: translateY(0); }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #fee2e2;
      color: #dc2626;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 100px;
      margin-bottom: 20px;
    }
    .dot {
      width: 8px;
      height: 8px;
      background: #dc2626;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">📡</span>
    <div class="badge">
      <div class="dot"></div>
      Internet Nahi Hai
    </div>
    <h1>Offline Hain Aap</h1>
    <p>
      Abhi internet connection nahi hai.<br/>
      Network theek hone par automatically wapas aa jayega.
    </p>
    <div class="tips">
      <h3>✅ Try karein:</h3>
      <ul>
        <li>📶 WiFi on/off karein</li>
        <li>📱 Mobile Data check karein</li>
        <li>✈️ Airplane mode off karein</li>
        <li>🔄 Page reload karein</li>
      </ul>
    </div>
    <button onclick="window.location.reload()">
      🔄 Dobara Try Karein
    </button>
  </div>
  <script>
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
